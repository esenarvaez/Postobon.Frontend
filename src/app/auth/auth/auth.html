<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-sm">
    <h2 class="text-xl font-bold mb-6 text-center text-gray-800">INICIO DE SESIÓN</h2>

    <form [formGroup]="form" (ngSubmit)="login()" class="space-y-4">
      <!-- Usuario -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>

        <input
          type="text"
          formControlName="username"
          placeholder="Tu usuario"
          class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
        />

        <p
          *ngIf="form.get('username')?.touched && form.get('username')?.invalid"
          class="text-red-500 text-sm mt-1"
        >
          El usuario es requerido.
        </p>
      </div>

      <!-- Contraseña -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>

        <input
          type="password"
          formControlName="password"
          placeholder="Tu contraseña"
          autocomplete="off"
          class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
        />

        <p
          *ngIf="form.get('password')?.touched && form.get('password')?.invalid"
          class="text-red-500 text-sm mt-1"
        >
          La contraseña es requerida.
        </p>
      </div>

      <button
        class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
        [disabled]="form.invalid"
      >
        Ingresar
      </button>
    </form>
  </div>
</div>
