<!-- Volver -->
<a routerLink="/requests" class="text-blue-600 hover:underline inline-block mb-4 font-medium">
  ← Volver
</a>

<h2 class="text-3xl font-bold mb-6 text-gray-800">Detalle de solicitud</h2>

<!-- Card principal -->
<div *ngIf="data" class="bg-white p-6 rounded-xl shadow-lg border border-gray-200">
  <!-- Información -->
  <div class="space-y-3 text-gray-700 text-base">
    <p>
      <span class="font-semibold text-gray-900">Categoría:</span>
      {{ data.category }}
    </p>

    <p>
      <span class="font-semibold text-gray-900">Descripción:</span>
      {{ data.description }}
    </p>

    <p>
      <span class="font-semibold text-gray-900">Valor:</span>
      {{ data.value | currency }}
    </p>

    <p>
      <span class="font-semibold text-gray-900">Fecha:</span>
      {{ data.expenseDate }}
    </p>

    <p>
      <span class="font-semibold text-gray-900">Estado:</span>
      <span
        class="px-3 py-1 rounded-full text-sm font-medium"
        [ngClass]="{
          'bg-yellow-100 text-yellow-700': data.status === 0,
          'bg-green-100 text-green-700': data.status === 1,
          'bg-red-100 text-red-700': data.status === 2,
        }"
      >
        {{ data.status }}
      </span>
    </p>
  </div>

  <!-- Acciones -->
  <div class="mt-8 flex flex-col md:flex-row gap-4">
    <!-- Aprobar -->
    <button
      *ngIf="data.status === 0"
      mat-raised-button
      color="primary"
      class="!h-auto px-6 py-2 font-semibold"
      (click)="approve()"
    >
      Aprobar
    </button>

    <!-- Rechazar -->
    <button
      *ngIf="data.status === 0"
      mat-raised-button
      color="warn"
      class="!h-auto px-6 py-2 font-semibold"
    >
      Rechazar
    </button>
  </div>

  <!-- Caja de rechazo -->
  <div *ngIf="data.status === 0" class="mt-6 bg-gray-50 p-4 rounded-xl border border-gray-200">
    <label class="block text-sm font-medium text-gray-700 mb-1"> Motivo del rechazo </label>

    <textarea
      [(ngModel)]="rejectReason"
      rows="3"
      placeholder="Escribe el motivo del rechazo..."
      class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500 sm:text-sm bg-white"
    >
    </textarea>

    <button
      mat-raised-button
      color="warn"
      class="!h-auto px-6 py-2 mt-3 font-semibold"
      (click)="reject()"
    >
      Enviar rechazo
    </button>
  </div>

  <!-- Editar -->
  <div class="mt-6">
    <a
      *ngIf="data.status === 0"
      [routerLink]="['/requests', data.id, 'edit']"
      class="text-blue-600 hover:underline font-medium"
    >
      Editar solicitud
    </a>
  </div>
</div>
