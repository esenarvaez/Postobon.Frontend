<!-- Volver -->
<a routerLink="/requests" class="text-blue-600 hover:underline inline-block mb-4 font-medium">
  ← Volver
</a>

<!-- Título -->
<h2 class="text-3xl font-bold mb-6 text-gray-800">{{ isEdit ? 'Editar' : 'Nueva' }} solicitud</h2>

<!-- Card principal -->
<div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200 max-w-2xl mx-auto">
  <form [formGroup]="form" (ngSubmit)="save()" class="space-y-4">
    <!-- Categoría -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
      <input
        formControlName="category"
        placeholder="Categoría"
        class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
      />
    </div>

    <!-- Descripción -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
      <input
        formControlName="description"
        placeholder="Descripción del gasto"
        class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
      />
    </div>

    <!-- Valor + Fecha -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Valor</label>
        <input
          formControlName="value"
          type="number"
          placeholder="0"
          class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha del gasto</label>
        <input
          formControlName="expenseDate"
          type="date"
          class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
        />
      </div>
    </div>

    <!-- Solicitado por -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Solicitado por</label>
      <input
        formControlName="requestedBy"
        placeholder="Nombre del solicitante"
        class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
      />
    </div>

    <!-- Botón Guardar -->
    <button
      class="col-span-full w-full bg-blue-600 text-white py-2 rounded-md font-semibold hover:bg-blue-700 transition-all"
    >
      Guardar
    </button>
  </form>
</div>
